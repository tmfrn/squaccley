<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAhQ6zzEPvJQhGFg76AEyn-6lXzfpZubFc",
  authDomain: "squaccley.firebaseapp.com",
  databaseURL: "https://squaccley-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "squaccley",
  storageBucket: "squaccley.firebasestorage.app",
  messagingSenderId: "990055034971",
  appId: "1:990055034971:web:391ecd8d579c37555c0f7e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const provider = new GoogleAuthProvider();
let currentUser = null;
let dbUnsubscribe = null;

window.signInWithGoogle = async function() {
  try {
    await signInWithPopup(auth, provider);
  } catch(e) {
    console.error('Sign in failed', e);
    setSyncStatus('Sign in failed — try again');
  }
};

window.signOutUser = async function() {
  if(dbUnsubscribe) { dbUnsubscribe(); dbUnsubscribe = null; }
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  updateAuthUI();
  if(user) {
    listenToDb(user.uid);
  } else {
    if(dbUnsubscribe) { dbUnsubscribe(); dbUnsubscribe = null; }
    setSyncStatus('Not signed in');
  }
});

function listenToDb(uid) {
  const userRef = ref(db, 'users/' + uid);
  dbUnsubscribe = onValue(userRef, snapshot => {
    const data = snapshot.val();
    if(data) {
      if(data.visited) window.visited = new Set(data.visited);
    } else {
      window.visited = new Set();
    }
    updateAuthUI();
    updateProgress();
    renderList();
    if(window.map) updateMapMarkers();
    setSyncStatus('Synced ✓');
  }, error => {
    setSyncStatus('Sync error — check connection');
  });
}

window.saveToDb = function() {
  if(!currentUser) return;
  const userRef = ref(db, 'users/' + currentUser.uid);
  set(userRef, {
    visited: [...window.visited]
  }).catch(e => setSyncStatus('Save failed — check connection'));
};

function updateAuthUI() {
  const btn = document.getElementById('auth-btn');
  const name = document.getElementById('auth-name');
  if(!btn) return;
  if(currentUser) {
    btn.textContent = 'Sign out';
    btn.onclick = window.signOutUser;
    name.textContent = currentUser.displayName ? currentUser.displayName.split(' ')[0] : '';
    setSyncStatus('Signed in · syncing…');
  } else {
    btn.textContent = 'Sign in with Google';
    btn.onclick = window.signInWithGoogle;
    name.textContent = '';
    setSyncStatus('Sign in to save your visits to the cloud');
  }
}

function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if(el) el.textContent = msg;
}
</script>

window.visited = new Set();
let currentTab = 'list', map = null, markers = {};
const STORAGE_KEY = 'squaccley_v1';

function loadLocal() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) window.visited = new Set(JSON.parse(s)); } catch(e) {}
}
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...window.visited])); } catch(e) {}
}
function saveData() {
  saveLocal();
  if(window.saveToDb) window.saveToDb();
}

function init() {
  loadLocal();
  updateProgress();
  renderList();
}

function updateProgress() {
  const active = getActivePlaces();
  const total = active.length;
  const done = [...window.visited].filter(id => active.find(p => p.id === id)).length;
  document.getElementById('visited-count').textContent = done;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-bar').style.width = (total > 0 ? done / total * 100 : 0) + '%';
}

function toggleVisit(id) {
  if(window.visited.has(id)) { window.visited.delete(id); showToast('Removed from visited'); }
  else { window.visited.add(id); showToast('Marked as visited ✓'); }
  saveData();
  updateProgress();
  renderList();
  if(currentTab === 'map') updateMapMarkers();
}

function getActivePlaces() {
  return PLACES;
}

function getFiltered() {
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const country = document.getElementById('filter-country').value;
  const denom = document.getElementById('filter-denom').value;
  const vf = document.getElementById('filter-visited').value;
  return getActivePlaces().filter(p => {
    if(search && !p.name.toLowerCase().includes(search) && !p.region.toLowerCase().includes(search)) return false;
    if(country && p.country !== country) return false;
    if(denom && p.denomination !== denom) return false;
    if(vf === 'visited' && !window.visited.has(p.id)) return false;
    if(vf === 'unvisited' && window.visited.has(p.id)) return false;
    return true;
  });
}

function renderList() {
  const filtered = getFiltered(), container = document.getElementById('places-list');
  if(filtered.length === 0) { container.innerHTML = '<div class="no-results">No places found</div>'; return; }
  const groups = {};
  filtered.forEach(p => { if(!groups[p.country]) groups[p.country] = []; groups[p.country].push(p); });
  const order = ['England', 'Wales', 'Scotland', 'Northern Ireland'];
  let html = '';
  order.forEach(c => {
    if(!groups[c]) return;
    html += `<div class="section-label">${c}</div>`;
    groups[c].sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
      const v = window.visited.has(p.id);
      html += `<div class="place-item ${v ? 'visited' : ''}" onclick="toggleVisit(${p.id})">
        <div class="tick-circle">${v ? '✓' : ''}</div>
        <div class="place-info">
          <div class="place-name">${p.name}</div>
          <div class="place-meta">${p.region || ''}</div>
        </div>
        <div class="place-type-badge">${p.denomination}</div>
      </div>`;
    });
  });
  container.innerHTML = html;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('view-list').style.display = tab === 'list' ? 'block' : 'none';
  document.getElementById('view-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  if(tab === 'map') { setTimeout(() => { if(!map) initMap(); else { map.invalidateSize(); updateMapMarkers(); } }, 50); }
}

function initMap() {
  map = L.map('map', {zoomControl: true}).setView([54.5, -3.5], 6);
  window.map = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 18}).addTo(map);
  updateMapMarkers();
}

function makeIcon(isVisited) {
  const color = isVisited ? '#5a7a5a' : '#b8956a';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="30" viewBox="0 0 22 30"><path d="M11 0 C5 0 0 5 0 11 C0 19 11 30 11 30 C11 30 22 19 22 11 C22 5 17 0 11 0Z" fill="${color}" opacity="0.9"/><circle cx="11" cy="11" r="5" fill="white" opacity="0.9"/></svg>`;
  return L.divIcon({html: svg, className: '', iconSize: [22, 30], iconAnchor: [11, 30], popupAnchor: [0, -30]});
}

function updateMapMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m)); markers = {};
  getActivePlaces().forEach(p => {
    const v = window.visited.has(p.id);
    const offset = [((p.id * 7) % 5 - 2) * 0.0003, ((p.id * 13) % 5 - 2) * 0.0003];
    const marker = L.marker([p.lat + offset[0], p.lon + offset[1]], {icon: makeIcon(v)});
    const meta = p.region ? p.region + ', ' + p.country : p.country;
    marker.bindPopup(`<div class="popup-name">${p.name}</div><div class="popup-meta">${meta} · ${p.denomination}</div><button class="popup-btn ${v ? 'visited-btn' : ''}" onclick="toggleVisit(${p.id});document.querySelectorAll('.leaflet-popup').forEach(e=>e.remove())">${v ? 'Remove visit' : 'Mark visited'}</button>`);
    marker.addTo(map); markers[p.id] = marker;
  });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
